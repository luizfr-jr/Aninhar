    stroke="#6B5FCF" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- "ORYUM TECH" text -->
  <text x="88" y="52"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="32" font-weight="700" fill="#2D2D2D" letter-spacing="4">ORYUM TECH</text>
</svg>
