<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80">
  <defs>
    <linearGradient id="oryumGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4A90D9"/>
      <stop offset="50%"  stop-color="#6B5FCF"/>
      <stop offset="100%" stop-color="#8B3FC8"/>
    </linearGradient>
  </defs>

  <!-- Icon: two interlocking S-curves in a circle -->
